version: 1.0
runtime: python3
build:
  commands:
    build:
      - pip install -r requirements.txt
run:
  runtime-version: 3.11
  command: uvicorn main:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
  env:
    - name: OPENROUTER_API_KEY
      value: "your_openrouter_api_key"
    - name: AWS_REGION
      value: "eu-central-1"

